{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h1>Login</h1>

<form method="post">
    {% csrf_token %}
    {{ form|crispy }}

    <button class="login-btn" type="submit">Login</button>
</form>

<p>
    No account?
    <a href="{% url 'account_signup' %}" class="signup-link">
        Sign up
    </a>
</p>
{% endblock %}
