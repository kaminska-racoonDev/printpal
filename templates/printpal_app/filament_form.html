{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <h1>{{ object|yesno:"Update,Create" }} filament</h1>

    <form action="" method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}

        <div class="action-block">
            <input type="submit" value="Submit" class="btn-black-bg">

            {% if object %}
                <a href="{% url 'printpal_app:filament-delete' object.pk %}" 
                   class="btn-black-bg btn">
                    Delete
                </a>
            {% endif %}
        </div>
    </form>
{% endblock %}
