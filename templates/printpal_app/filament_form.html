{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <h1>{{ object|yesno:"Update,Create" }} filament</h1>
    <form action="" method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}

        <input type="submit" value="Submit" class="btn-black-bg">
        <a href="{% url 'printpal_app:filament-delete' filament.pk%}" class="btn-black-bg">Delete</a>
    </form>
{% endblock %}
