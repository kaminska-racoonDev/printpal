{% extends 'base.html' %}

{% block content %}

<h1>Are you sure you want to delete printer {{printer.name}} ({{ printer.model_name }})?</h1>
<div class="alert-danger alert">This action is irreversible.</div>
<form action="" method="post">
    {% csrf_token %}
    <a href="{% url 'printpal_app:printer-list' %}" class="btn btn-secondary">No.Take me back.</a>
    <input type="submit" value="Yes. Delete." class="btn btn-danger"></input>
</form>
{% endblock %}
